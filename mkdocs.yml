---
site_name: Proxy 4
site_url: https://mingxwa.github.io/proxy
site_description: Next Generation Polymorphism in C++
site_author: Microsoft Windows Team

repo_url: https://github.com/microsoft/proxy/
edit_uri: ""

theme:
  name: material
  custom_dir: mkdocs-overrides
  extra_css:
    - config/extra.css
  font: false
  palette:
    - primary: black
  logo: config/icon.png
  favicon: config/icon.png
  features:
    - navigation.instant
    - navigation.indexes

plugins:
  - awesome-pages
  - git-revision-date-localized
  - open-in-new-tab
  - search

markdown_extensions:
  - admonition
  - mdx_truly_sane_lists
  - meta
  - pymdownx.highlight
  - pymdownx.pathconverter
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.tasklist
