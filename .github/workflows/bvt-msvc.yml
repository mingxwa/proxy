on:
  workflow_call:
    inputs:
      branch:
        type: string
        required: false

jobs:
  bvt-msvc:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ${{ inputs.branch }}

    - name: build and run test with MSVC
      run: |
        cmake -B build
        cmake --build build --config Release -j
        ctest --test-dir build -j

    - name: run benchmarks
      run: |
        cd build/benchmarks
        .\msft_proxy_benchmarks.exe --benchmark_repetitions=10 --benchmark_enable_random_interleaving=true --benchmark_out=benchmarking-results.json

    - name: archive benchmarking results
      uses: actions/upload-artifact@v4
      with:
        name: benchmarking-results-msvc
        path: build/benchmarks/benchmarking-results.json
