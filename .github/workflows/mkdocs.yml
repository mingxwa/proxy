---
name: Build and deploy mkdocs to https://mingxwa.github.io/proxy
on:
  push:
    branches:
      - user/mingxwa/doc
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: write
      deployments: write
      issues: write
      pages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: user/mingxwa/doc
          submodules: "recursive"
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod
      - name: Setup Python
        uses: actions/setup-python@v1
        with:
          python-version: "3.13"
          architecture: "x64"
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install wheel
          python3 -m pip install -r requirements-docs.txt
      - name: Build site
        run: mkdocs build
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
