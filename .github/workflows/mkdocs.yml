---
name: Build and deploy mkdocs to https://microsoft.github.io/proxy
on:
  push:
    branches:
      - lkg
      - user/mingxwa/doc
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      deployments: write
      issues: write
      pages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: "recursive"
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod
      - name: Setup Python
        uses: actions/setup-python@v1
        with:
          python-version: "3.13"
          architecture: "x64"
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install wheel mkdocs==1.3.* mkdocs-material==8.2.* pymdown-extensions>=10.0 markdown==3.3.* mdx_truly_sane_lists==1.2 mkdocs-git-revision-date-localized-plugin==1.0.* mkdocs-awesome-pages-plugin==2.9.1

      - name: Build site
        run: mkdocs build
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
