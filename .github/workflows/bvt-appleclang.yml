on:
  workflow_call:
  workflow_dispatch:

jobs:
  bvt-appleclang:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v6

    - name: Install meson
      run: pipx install meson

    - name: Check toolchain versions
      run: |
        cc --version
        xcodebuild -version
        cmake --version
        ninja --version
        meson --version
        bazel version

    # TEMPORARY: probe workarounds for value-dependent __ptrauth discriminators.
    - name: Probe __ptrauth template workarounds (arm64e)
      run: |
        c++ --version | head -1
        probe() {
          printf '%s\n' "$2" > /tmp/w.cpp
          if c++ -std=c++23 -arch arm64e -fsyntax-only /tmp/w.cpp 2>/tmp/w.err; then
            echo "PASS: $1"
          else
            echo "FAIL: $1"; grep -aE "error:" /tmp/w.err | head -1 | sed 's/^/      /'
          fi
        }
        probe "W1 NTTP discriminator (dependent template arg)" '#include <ptrauth.h>
        template<unsigned D> struct Sig { using FP=void(*)(); FP __ptrauth(ptrauth_key_function_pointer,1,D) f; };
        template<class T> struct S { Sig<ptrauth_type_discriminator(void(*)(T*))> s; };
        S<int> x;'
        probe "W2 static-constexpr-member as disc" '#include <ptrauth.h>
        template<class T> struct S { static constexpr unsigned d=ptrauth_type_discriminator(void(*)(T*)); using FP=void(*)(); FP __ptrauth(ptrauth_key_function_pointer,1,d) f; };
        S<int> x;'
        probe "W3 inner sign_constant (constexpr, dependent type-disc)" '#include <ptrauth.h>
        void g();
        template<class T> struct S { static constexpr void* C = ptrauth_sign_constant((void*)&g, ptrauth_key_function_pointer, ptrauth_type_discriminator(void(*)(T*))); };
        template struct S<int>;'
        probe "W4 auth_and_resign runtime (std fnptr -> type-disc)" '#include <ptrauth.h>
        template<class T> struct S { using FP=void(*)(); void* v; explicit S(FP p):v(ptrauth_auth_and_resign((void*)p, ptrauth_key_function_pointer, ptrauth_function_pointer_type_discriminator(void(*)()), ptrauth_key_function_pointer, ptrauth_type_discriminator(void(*)(T*)))){} };
        template struct S<int>;'
        probe "W5 ptrauth_function_pointer_type_discriminator exists" '#include <ptrauth.h>
        static_assert(ptrauth_function_pointer_type_discriminator(void(*)(int)) != 0 || true);'
        echo "----- probe done; failing to surface log -----"
        exit 1

    # The default target on these runners is arm64, which has no pointer
    # authentication. Build and run just the test binary as arm64e -- the ABI
    # where v-tables are signed -- to exercise proxy's signed dispatch metadata.
    # (proxy_pac_tests itself static_asserts that PAC is enabled on this target.)
    - name: Build and run tests as arm64e (pointer authentication)
      run: |
        cmake -B build-arm64e -GNinja -DCMAKE_CXX_STANDARD=23 -DCMAKE_BUILD_TYPE=Release -DPROXY_BUILD_MODULES=FALSE -DBUILD_DOC_TESTING=OFF -DCMAKE_OSX_ARCHITECTURES=arm64e
        cmake --build build-arm64e -j --target msft_proxy_tests
        ./build-arm64e/tests/msft_proxy_tests

    - name: Build and run test with AppleClang on cmake
      run: |
        cmake -B build-cmake -GNinja -DCMAKE_CXX_STANDARD=23 -DCMAKE_BUILD_TYPE=Release -DPROXY_BUILD_MODULES=FALSE
        cmake --build build-cmake -j
        ctest --test-dir build-cmake -j
        mkdir build-cmake/drop
        bash ./tools/dump_build_env.sh c++ build-cmake/drop/env-info.json

    - name: Build and run test with AppleClang on meson
      run: |
        meson setup build-meson --buildtype=release -Dtests=enabled -Dbenchmarks=enabled
        meson test -C build-meson
        meson test -C build-meson --benchmark --test-args=--benchmark_list_tests=true

    - name: Build and Run test with AppleClang on bazel
      run: bazel test --lockfile_mode=error //tests:proxy_tests //benchmarks:proxy_benchmarks //docs/...

    - name: Run benchmarks
      run: build-cmake/benchmarks/msft_proxy_benchmarks --benchmark_min_warmup_time=0.1 --benchmark_min_time=0.1s --benchmark_repetitions=30 --benchmark_enable_random_interleaving=true --benchmark_report_aggregates_only=true --benchmark_format=json > build-cmake/drop/benchmarking-results.json

    - name: Archive benchmarking results
      uses: actions/upload-artifact@v7
      with:
        name: drop-appleclang
        path: build-cmake/drop/
