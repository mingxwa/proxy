on:
  workflow_call:
  workflow_dispatch:

# NOTE (development): trimmed to only the arm64e pointer-authentication work
# while it is being developed. The full AppleClang BVT (cmake/meson/bazel/
# benchmarks) is restored before this branch is finalized.
jobs:
  bvt-appleclang:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v6

    - name: Check toolchain version
      run: c++ --version

    # Build and run the test suite as arm64e -- the ABI where v-tables are
    # signed -- to exercise proxy's manually-signed dispatch metadata (address +
    # type diversity). proxy_pac_tests static_asserts that PAC is on here.
    - name: Build and run tests as arm64e (pointer authentication)
      run: |
        cmake -B build-arm64e -GNinja -DCMAKE_CXX_STANDARD=23 -DCMAKE_BUILD_TYPE=Release -DPROXY_BUILD_MODULES=FALSE -DBUILD_DOC_TESTING=OFF -DCMAKE_OSX_ARCHITECTURES=arm64e
        cmake --build build-arm64e -j --target msft_proxy_tests
        ./build-arm64e/tests/msft_proxy_tests
