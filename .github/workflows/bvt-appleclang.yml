on:
  workflow_call:
  workflow_dispatch:

jobs:
  bvt-appleclang:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v6

    - name: Install meson
      run: pipx install meson

    - name: Check toolchain versions
      run: |
        cc --version
        xcodebuild -version
        cmake --version
        ninja --version
        meson --version
        bazel version

    # TEMPORARY diagnostic: reveal proxy_view trait values on arm64e via the
    # undefined-template trick (each error prints Show<Name, true|false>).
    - name: Diagnose proxy_view traits on arm64e
      run: |
        cat > diag.cpp <<'CPP'
        #include <proxy/proxy.h>
        struct DF : pro::facade_builder::build {};
        using V = pro::proxy_view<DF>;
        template<class,bool> struct Show;
        Show<struct CopyCtor, std::is_copy_constructible_v<V>> a;
        Show<struct NothrowCopy, std::is_nothrow_copy_constructible_v<V>> b;
        Show<struct NothrowMove, std::is_nothrow_move_constructible_v<V>> c;
        Show<struct NothrowDtor, std::is_nothrow_destructible_v<V>> d;
        Show<struct TrivCopyable, std::is_trivially_copyable_v<V>> e;
        Show<struct BitwiseReloc, pro::is_bitwise_trivially_relocatable_v<V>> f;
        Show<struct Proxiable, pro::proxiable<V, DF>> g;
        Show<struct Reloc, (int)DF::relocatability> h;
        CPP
        c++ -std=c++23 -arch arm64e -Iinclude -fsyntax-only diag.cpp 2>&1 | grep -aE "Show<" | head -20 || true
        echo "----- diagnostic done; failing to surface log -----"
        exit 1

    # The default target on these runners is arm64, which has no pointer
    # authentication, so build and run the suite as arm64e -- the ABI where
    # v-tables are signed -- to exercise proxy's signed dispatch metadata.
    # Placed first so a PAC regression fails fast.
    - name: Verify pointer authentication is enabled on arm64e
      run: |
        printf '#include <proxy/proxy.h>\n#if !PRO4D_PAC\n#error PRO4D_PAC must be 1 on arm64e\n#endif\nint main() {}\n' > pac_check.cpp
        c++ -std=c++23 -arch arm64e -Iinclude -fsyntax-only pac_check.cpp
        echo "PRO4D_PAC is enabled for arm64e."

    - name: Build and run tests as arm64e (pointer authentication)
      run: |
        cmake -B build-arm64e -GNinja -DCMAKE_CXX_STANDARD=23 -DCMAKE_BUILD_TYPE=Release -DPROXY_BUILD_MODULES=FALSE -DCMAKE_OSX_ARCHITECTURES=arm64e
        cmake --build build-arm64e -j
        ctest --test-dir build-arm64e -j --output-on-failure

    - name: Build and run test with AppleClang on cmake
      run: |
        cmake -B build-cmake -GNinja -DCMAKE_CXX_STANDARD=23 -DCMAKE_BUILD_TYPE=Release -DPROXY_BUILD_MODULES=FALSE
        cmake --build build-cmake -j
        ctest --test-dir build-cmake -j
        mkdir build-cmake/drop
        bash ./tools/dump_build_env.sh c++ build-cmake/drop/env-info.json

    - name: Build and run test with AppleClang on meson
      run: |
        meson setup build-meson --buildtype=release -Dtests=enabled -Dbenchmarks=enabled
        meson test -C build-meson
        meson test -C build-meson --benchmark --test-args=--benchmark_list_tests=true

    - name: Build and Run test with AppleClang on bazel
      run: bazel test --lockfile_mode=error //tests:proxy_tests //benchmarks:proxy_benchmarks //docs/...

    - name: Run benchmarks
      run: build-cmake/benchmarks/msft_proxy_benchmarks --benchmark_min_warmup_time=0.1 --benchmark_min_time=0.1s --benchmark_repetitions=30 --benchmark_enable_random_interleaving=true --benchmark_report_aggregates_only=true --benchmark_format=json > build-cmake/drop/benchmarking-results.json

    - name: Archive benchmarking results
      uses: actions/upload-artifact@v7
      with:
        name: drop-appleclang
        path: build-cmake/drop/
