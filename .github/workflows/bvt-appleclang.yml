on:
  workflow_call:
  workflow_dispatch:

jobs:
  bvt-appleclang:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v6

    - name: Install meson
      run: pipx install meson

    - name: Check toolchain versions
      run: |
        cc --version
        xcodebuild -version
        cmake --version
        ninja --version
        meson --version
        bazel version

    - name: Build and run test with AppleClang on cmake
      run: |
        cmake -B build-cmake -GNinja -DCMAKE_CXX_STANDARD=23 -DCMAKE_BUILD_TYPE=Release -DPROXY_BUILD_MODULES=FALSE
        cmake --build build-cmake -j
        ctest --test-dir build-cmake -j
        mkdir build-cmake/drop
        bash ./tools/dump_build_env.sh c++ build-cmake/drop/env-info.json

    # TEMPORARY probe: determine which __ptrauth discriminator forms Apple clang
    # accepts inside a class template on arm64e. Always exits 0 (reports only).
    - name: Probe PAC discriminator forms (arm64e)
      run: |
        probe() {
          printf '%s\n' "$2" > /tmp/probe.cpp
          if c++ -std=c++23 -arch arm64e -fsyntax-only /tmp/probe.cpp 2>/tmp/probe.err; then
            echo "PASS: $1"
          else
            echo "FAIL: $1"; sed 's/^/      /' /tmp/probe.err | head -2
          fi
        }
        probe "F1 builtin-type-disc dependent" '#include <ptrauth.h>
        template<class T> struct S { void(*f)() __ptrauth(ptrauth_key_function_pointer,1,ptrauth_type_discriminator(void(*)(T*))); };
        S<int> s;'
        probe "F2 string-disc nondependent" '#include <ptrauth.h>
        template<class T> struct S { void(*f)() __ptrauth(ptrauth_key_function_pointer,1,ptrauth_string_discriminator("x")); };
        S<int> s;'
        probe "F3 consteval-int dependent" '#include <ptrauth.h>
        #include <cstdint>
        template<class T> consteval uint16_t d(){ return sizeof(T)?0x1234:1; }
        template<class T> struct S { void(*f)() __ptrauth(ptrauth_key_function_pointer,1,d<T>()); };
        S<int> s;'
        probe "F5 builtin-type-disc plain-nontemplate" '#include <ptrauth.h>
        struct S { void(*f)() __ptrauth(ptrauth_key_function_pointer,1,ptrauth_type_discriminator(void(*)(int))); };'
        probe "F6 builtin-type-disc var-template-wrapped" '#include <ptrauth.h>
        template<class T> constexpr unsigned dv = ptrauth_type_discriminator(void(*)(T*));
        template<class T> struct S { void(*f)() __ptrauth(ptrauth_key_function_pointer,1,dv<T>); };
        S<int> s;'
        true

    - name: Build and run test with AppleClang on meson
      run: |
        meson setup build-meson --buildtype=release -Dtests=enabled -Dbenchmarks=enabled
        meson test -C build-meson
        meson test -C build-meson --benchmark --test-args=--benchmark_list_tests=true

    - name: Build and Run test with AppleClang on bazel
      run: bazel test --lockfile_mode=error //tests:proxy_tests //benchmarks:proxy_benchmarks //docs/...

    - name: Run benchmarks
      run: build-cmake/benchmarks/msft_proxy_benchmarks --benchmark_min_warmup_time=0.1 --benchmark_min_time=0.1s --benchmark_repetitions=30 --benchmark_enable_random_interleaving=true --benchmark_report_aggregates_only=true --benchmark_format=json > build-cmake/drop/benchmarking-results.json

    - name: Archive benchmarking results
      uses: actions/upload-artifact@v7
      with:
        name: drop-appleclang
        path: build-cmake/drop/
