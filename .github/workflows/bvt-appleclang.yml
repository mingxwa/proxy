on:
  workflow_call:
  workflow_dispatch:

# NOTE (development): trimmed to only the arm64e pointer-authentication work
# while it is being developed. The full AppleClang BVT (cmake/meson/bazel/
# benchmarks) is restored before this branch is finalized.
jobs:
  bvt-appleclang:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v6

    - name: Check toolchain version
      run: c++ --version

    # TEMPORARY probe: which form gives a signature-distinguishing discriminator?
    - name: Probe ptrauth_type_discriminator forms (arm64e)
      run: |
        cat > /tmp/d.cpp <<'CPP'
        #include <ptrauth.h>
        #include <cstdio>
        int main() {
          printf("ptr int(*)(int)   = %llu\n", (unsigned long long)ptrauth_type_discriminator(int(*)(int)));
          printf("ptr long(*)(long) = %llu\n", (unsigned long long)ptrauth_type_discriminator(long(*)(long)));
          printf("fn  int(int)      = %llu\n", (unsigned long long)ptrauth_type_discriminator(int(int)));
          printf("fn  long(long)    = %llu\n", (unsigned long long)ptrauth_type_discriminator(long(long)));
          printf("fn  int(int)noex  = %llu\n", (unsigned long long)ptrauth_type_discriminator(int(int) noexcept));
          printf("fnptr-disc int(*)(int)   = %llu\n", (unsigned long long)ptrauth_function_pointer_type_discriminator(int(*)(int)));
          printf("fnptr-disc long(*)(long) = %llu\n", (unsigned long long)ptrauth_function_pointer_type_discriminator(long(*)(long)));
          return 0;
        }
        CPP
        c++ -std=c++23 -arch arm64e /tmp/d.cpp -o /tmp/d && /tmp/d
        echo "----- probe done -----"
        exit 1
