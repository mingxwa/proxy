name: Bump-Dependencies

# Weekly dependency automation, all in a single pull request. Self-hosted Renovate
# (renovate.json) discovers every version bump -- GitHub Actions, pre-commit hooks, the
# mkdocs PyPI pins, MODULE.bazel (Bazel Central Registry), .bazelversion, and the CMake
# FetchContent registry (via a customManager). Renovate then runs tools/bump_dependencies.py
# as a post-upgrade task, on the same branch, to regenerate the artifacts it cannot compute:
# the CMake tarball hashes, the Meson wraps, and MODULE.bazel.lock. Everything lands in one PR.
#
# Renovate runs directly on the runner (not its container) so the post-upgrade task has
# python, meson and bazelisk available.

on:
  push:
    branches: [test/bump-validate] # TEMP: validation only, removed before merge
  schedule:
    - cron: "0 6 * * 1" # Mondays at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-24.04
    # The weekly cron only runs on the canonical repo. Forks can still trigger it manually.
    if: github.event_name != 'schedule' || github.repository == 'ngcpp/proxy'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Meson and Bazelisk
        run: |
          python3 -m pip install --upgrade pip meson
          curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/download/v1.29.0/bazelisk-linux-amd64
          chmod +x /usr/local/bin/bazel

      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_AUTODISCOVER: "false"
          RENOVATE_ONBOARDING: "false"
          # Manage whichever branch the workflow runs on (the default branch for the cron).
          RENOVATE_BASE_BRANCHES: ${{ github.ref_name }}
          # Self-hosted gate: only our post-upgrade hook may run as a postUpgradeTasks command.
          RENOVATE_ALLOWED_POST_UPGRADE_COMMANDS: '["^python3 tools/bump_dependencies\\.py$"]'
          LOG_LEVEL: info
        run: npx --yes renovate
