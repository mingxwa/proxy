name: Bump-Dependencies

# Weekly dependency automation, all in a single pull request. Self-hosted Renovate
# (renovate.json) discovers every version bump -- GitHub Actions, pre-commit hooks, the
# mkdocs PyPI pins, MODULE.bazel (Bazel Central Registry), .bazelversion, and the CMake
# FetchContent registry (via a customManager). Renovate then runs tools/bump_dependencies.py
# as a post-upgrade task, on the same branch, to regenerate the artifacts it cannot compute:
# the CMake tarball hashes, the Meson wraps, and MODULE.bazel.lock. Everything lands in one PR.
#
# Renovate runs directly on the runner (not its container) so the post-upgrade task has
# python, meson and bazelisk available.
#
# Auth: updating the `uses:` pins inside .github/workflows/*.yml needs a token with the
# `workflow` scope, which GITHUB_TOKEN cannot have. We mint a short-lived, repo-scoped token
# from a GitHub App each run, so the only stored secrets are the App ID + private key (no
# personal-account access). Create a GitHub App with repository permissions Contents,
# Pull requests and Workflows (read & write), install it on this repo, and set the
# RENOVATE_APP_ID and RENOVATE_APP_PRIVATE_KEY secrets. The job fails fast if they are unset.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-24.04
    # The weekly cron only runs on the canonical repo. Forks can still trigger it manually.
    if: github.event_name != 'schedule' || github.repository == 'ngcpp/proxy'
    steps:
      - name: Require Renovate App credentials
        env:
          RENOVATE_APP_ID: ${{ secrets.RENOVATE_APP_ID }}
          RENOVATE_APP_PRIVATE_KEY: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$RENOVATE_APP_ID" ] || [ -z "$RENOVATE_APP_PRIVATE_KEY" ]; then
            echo "::error::RENOVATE_APP_ID / RENOVATE_APP_PRIVATE_KEY secrets are not set. Create a GitHub App (Contents, Pull requests, Workflows: read & write), install it on this repo, and add its App ID and a private key as those secrets. See the workflow header."
            exit 1
          fi

      - name: Mint a GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Resolve the App's bot identity
        id: bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          slug='${{ steps.app-token.outputs.app-slug }}'
          uid=$(gh api "/users/${slug}[bot]" --jq '.id')
          echo "username=${slug}[bot]" >> "$GITHUB_OUTPUT"
          echo "git-author=${slug}[bot] <${uid}+${slug}[bot]@users.noreply.github.com>" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Meson and Bazelisk
        run: |
          python3 -m pip install --upgrade pip meson
          sudo curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/download/v1.29.0/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel

      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          RENOVATE_USERNAME: ${{ steps.bot.outputs.username }}
          RENOVATE_GIT_AUTHOR: ${{ steps.bot.outputs.git-author }}
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_AUTODISCOVER: "false"
          RENOVATE_ONBOARDING: "false"
          # Manage whichever branch the workflow runs on (the default branch for the cron).
          RENOVATE_BASE_BRANCHES: ${{ github.ref_name }}
          # Self-hosted gate: only our post-upgrade hook may run as a postUpgradeTasks command.
          RENOVATE_ALLOWED_POST_UPGRADE_COMMANDS: '["^python3 tools/bump_dependencies\\.py 2>/tmp/bump-warnings\\.txt$"]'
          LOG_LEVEL: info
        run: npx --yes renovate

      - name: Surface post-upgrade warnings
        if: always()
        # Renovate captures the post-upgrade task's output, so the script writes warnings to
        # /tmp/bump-warnings.txt (--warnings-file) and this step re-emits them as annotations.
        run: |
          f=/tmp/bump-warnings.txt
          if [ -s "$f" ]; then
            while IFS= read -r line; do
              echo "::warning title=bump_dependencies::$line"
            done < "$f"
          else
            echo "No post-upgrade warnings."
          fi
