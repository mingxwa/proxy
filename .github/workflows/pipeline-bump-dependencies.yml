name: Bump-Dependencies

# Weekly dependency automation, all in a single pull request. Self-hosted Renovate
# (renovate.json) bumps everything with a standard manager -- GitHub Actions, pre-commit
# hooks, the mkdocs PyPI pins, MODULE.bazel (Bazel Central Registry) and .bazelversion. It
# then refreshes MODULE.bazel.lock as a post-upgrade step (`bazel mod graph`) so the lock
# tracks the bazel_dep versions just bumped. Everything lands in one PR.
#
# The CMake FetchContent registries and Meson wraps -- which no Renovate manager can discover --
# live in their own pipeline (pipeline-bump-cmake-meson.yml). Bazel ships preinstalled (as
# bazelisk) on the GitHub-hosted image, so the post step needs no extra setup.
#
# Auth: updating the `uses:` pins inside .github/workflows/*.yml needs a token with the
# `workflow` scope, which GITHUB_TOKEN cannot have. A GitHub App's installation token can, but
# such tokens are short-lived (~1h) and cannot be issued from the App settings page, so we mint
# one per run from the App ID + private key. That keeps the only stored secrets to those two
# (no personal-account PAT). Create a GitHub App with repository permissions Contents,
# Pull requests, Workflows and Commit statuses (read & write) -- the last lets Renovate flag a
# failed post-upgrade task as a red check on the PR -- install it on this repo, and set the
# RENOVATE_APP_ID and RENOVATE_APP_PRIVATE_KEY secrets (the token step fails if they are unset).

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-24.04
    # The weekly cron only runs on the canonical repo. Forks can still trigger it manually.
    if: github.event_name != 'schedule' || github.repository == 'ngcpp/proxy'
    steps:
      - name: Mint a GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      # Renovate must be told its own identity: an App installation token cannot self-identify
      # via the /user API the way a PAT can. The username (from the token step) lets Renovate
      # recognize and rebase its own PR; the git-author needs the bot's numeric id so commits
      # link to the App account.
      - name: Resolve the bot's commit identity
        id: bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          slug='${{ steps.app-token.outputs.app-slug }}'
          uid=$(gh api "/users/${slug}[bot]" --jq '.id')
          echo "git-author=${slug}[bot] <${uid}+${slug}[bot]@users.noreply.github.com>" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          RENOVATE_USERNAME: ${{ steps.app-token.outputs.app-slug }}[bot]
          RENOVATE_GIT_AUTHOR: ${{ steps.bot.outputs.git-author }}
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_AUTODISCOVER: "false"
          RENOVATE_ONBOARDING: "false"
          # Manage whichever branch the workflow runs on (the default branch for the cron).
          RENOVATE_BASE_BRANCHES: ${{ github.ref_name }}
          # Self-hosted safety gate: Renovate runs a postUpgradeTasks command only if it matches
          # this allowlist. The only post step is the bazel lockfile refresh.
          RENOVATE_ALLOWED_POST_UPGRADE_COMMANDS: '["^bazel mod graph --lockfile_mode=update$"]'
          LOG_LEVEL: info
        run: npx --yes renovate
