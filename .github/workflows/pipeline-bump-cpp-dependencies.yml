name: Bump-Cpp-Dependencies

# Weekly bump of the C++ library pins that Renovate has no manager for: the CMake FetchContent
# registries (cmake/dependencies.json, tools/report_generator/dependencies.json) and the Meson
# wraps (subprojects/*.wrap). tools/bump_cmake_meson_deps.py finds the latest releases, rewrites
# the pins (recomputing each CMake sha256) and refreshes the wraps; this workflow then opens one
# PR with the result. The schedule itself is the trigger -- with no Renovate manager, these can't
# ride its branch.
#
# The Bazel versions of the same libraries (fmt, googletest, google_benchmark in MODULE.bazel)
# *do* have a manager, so Renovate bumps them via the Bazel Central Registry over in
# pipeline-renovate.yml -- this pipeline only covers what Renovate can't.
#
# Auth reuses the same GitHub App as the Renovate pipeline (DEPENDENCY_MANAGER_APP_ID /
# DEPENDENCY_MANAGER_APP_PRIVATE_KEY). The PR must be opened by the App, not GITHUB_TOKEN, so CI
# runs on it; Contents + Pull requests (write) is all this one needs.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump-cpp-dependencies:
    runs-on: ubuntu-24.04
    # The weekly cron only runs on the canonical repo. Forks can still trigger it manually.
    if: github.event_name != 'schedule' || github.repository == 'ngcpp/proxy'
    steps:
      - name: Mint a GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DEPENDENCY_MANAGER_APP_ID }}
          private-key: ${{ secrets.DEPENDENCY_MANAGER_APP_PRIVATE_KEY }}

      # Author the bump commit as the App's bot (the numeric id links it to the App account),
      # otherwise the commit is attributed to whoever triggered the run.
      - name: Resolve the bot's commit identity
        id: bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          slug='${{ steps.app-token.outputs.app-slug }}'
          uid=$(gh api "/users/${slug}[bot]" --jq '.id')
          echo "name=${slug}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${uid}+${slug}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      # Check out with the App token so the branch push is attributed to the App -- that is what
      # makes CI run on the PR (a push by the default GITHUB_TOKEN would not trigger it).
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Meson
        run: python3 -m pip install --upgrade pip meson

      - name: Bump CMake and Meson dependencies
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python3 tools/bump_cmake_meson_deps.py

      # Commit the bumps to bump/cmake-meson and open the PR (or update it if one is already
      # open) with plain git + gh -- no third-party action holds the App token. Nothing to do
      # when the script changed nothing.
      - name: Open or update the pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_NAME: ${{ steps.bot.outputs.name }}
          GIT_EMAIL: ${{ steps.bot.outputs.email }}
          BASE: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "No dependency changes; nothing to do."
            exit 0
          fi
          branch=bump/cmake-meson
          git config user.name "$GIT_NAME"
          git config user.email "$GIT_EMAIL"
          git checkout -B "$branch"
          git add -A
          git commit -m "Bump CMake and Meson dependencies"
          git push --force origin "$branch"
          if [ -n "$(gh pr list --head "$branch" --base "$BASE" --state open --json number --jq '.[0].number // empty')" ]; then
            echo "Updated the existing pull request."
          else
            gh pr create --base "$BASE" --head "$branch" \
              --title "Bump CMake and Meson dependencies" \
              --body 'Automated bump of the CMake FetchContent registries and the Meson wraps (`tools/bump_cmake_meson_deps.py`). The Renovate pipeline handles everything else.'
          fi
