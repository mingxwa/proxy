on:
  workflow_call:
  workflow_dispatch:

jobs:
  bvt-apple-pac:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v6

    - name: Install meson
      run: pipx install meson

    - name: Check toolchain versions
      run: |
        cc --version
        xcodebuild -version
        cmake --version
        ninja --version
        meson --version

    # The default runner architecture is arm64, which has no pointer
    # authentication. Build as arm64e -- the ABI where v-tables are signed -- to
    # exercise proxy's signed dispatch metadata (address + type diversity).
    # proxy_pac_tests static_asserts that PAC is enabled.
    - name: Build and run tests as arm64e (pointer authentication)
      run: |
        cmake -B build-arm64e -GNinja -DCMAKE_CXX_STANDARD=23 -DCMAKE_BUILD_TYPE=Release -DPROXY_BUILD_MODULES=FALSE -DBUILD_DOC_TESTING=OFF -DCMAKE_OSX_ARCHITECTURES=arm64e
        cmake --build build-arm64e -j --target msft_proxy_tests
        ./build-arm64e/tests/msft_proxy_tests

    # Benchmark the arm64e ABI (where the dispatch metadata is signed) to measure
    # the cost of pointer authentication on proxy's hot paths.
    - name: Build benchmarks as arm64e
      run: |
        cmake -B build-bench -GNinja -DCMAKE_CXX_STANDARD=23 -DCMAKE_BUILD_TYPE=Release -DPROXY_BUILD_MODULES=FALSE -DBUILD_DOC_TESTING=OFF -DCMAKE_OSX_ARCHITECTURES=arm64e
        cmake --build build-bench -j --target msft_proxy_benchmarks
        mkdir build-bench/drop
        bash ./tools/dump_build_env.sh c++ build-bench/drop/env-info.json

    - name: Run benchmarks
      run: build-bench/benchmarks/msft_proxy_benchmarks --benchmark_min_warmup_time=0.1 --benchmark_min_time=0.1s --benchmark_repetitions=30 --benchmark_enable_random_interleaving=true --benchmark_report_aggregates_only=true --benchmark_format=json > build-bench/drop/benchmarking-results.json

    - name: Archive benchmarking results
      uses: actions/upload-artifact@v7
      with:
        name: drop-apple-pac
        path: build-bench/drop/
